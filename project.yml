name: Cartrack
options:
  bundleIdPrefix: com.duku
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    TARGETED_DEVICE_FAMILY: 1
    SUPPORTS_MACCATALYST: NO
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Cartrack stores invoice, odometer, and fuel level photos for fuel tracking.
    INFOPLIST_KEY_NSCameraUsageDescription: Cartrack uses the camera to capture invoice, odometer, and fuel level photos.
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Cartrack stores location for each fill-up and snapshot event.
    INFOPLIST_KEY_NSUserNotificationsUsageDescription: Cartrack uses notifications to remind you when you have not logged a capture recently.
targets:
  Cartrack:
    type: application
    platform: iOS
    sources:
      - path: Cartrack
        excludes:
          - Resources/**
      - path: CartrackCore/Sources/CartrackCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.duku.cartrack
        PRODUCT_NAME: Cartrack
        INFOPLIST_KEY_CFBundleDisplayName: Cartrack
    scheme:
      testTargets:
        - CartrackTests
        - CartrackUITests
  CartrackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CartrackTests
    dependencies:
      - target: Cartrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.duku.cartrackTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Cartrack.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Cartrack"
  CartrackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - CartrackUITests
    dependencies:
      - target: Cartrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.duku.cartrackUITests
        TEST_TARGET_NAME: Cartrack
